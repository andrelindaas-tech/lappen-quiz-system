<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" width="100" height="90">
  <!--
    Vikepliktskilt (Norwegian yield sign)
    Inverted equilateral triangle with rounded corners.
    Vertices of a 100x90 inverted triangle (flat top, point down):
      Top-left:  (4, 4)
      Top-right: (96, 4)
      Bottom:    (50, 88)
    Corner radius: ~8 units
    We use L + Q (quadratic bezier) for each corner.
  -->

  <!-- Outer red rounded triangle -->
  <path d="
    M 14,4
    L 86,4
    Q 96,4 91,12.8
    L 55.2,83.5
    Q 50,93 44.8,83.5
    L 9,12.8
    Q 4,4 14,4
    Z"
    fill="#e5320a"
    stroke="white"
    stroke-width="3.5"
    stroke-linejoin="round"
  />

  <!-- White inner rounded triangle (smaller, same proportions) -->
  <path d="
    M 31,20
    L 69,20
    Q 76.5,20 73,26.2
    L 54.5,58.5
    Q 50,66 45.5,58.5
    L 27,26.2
    Q 23.5,20 31,20
    Z"
    fill="white"
    stroke="none"
  />
</svg>
