<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skiltbank POC</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
      }

      img {
        display: block;
        width: 100%;
        height: 140px;
        object-fit: contain;
      }

      figcaption {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Skiltbank POC</h1>
      <p>Offisielle JPG-filer fra Statens vegvesen, lagret lokalt for proof of concept.</p>
